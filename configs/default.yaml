project:
  name: deep-learning-midterm
  package: dl_midterm

paths:
  data_dir: data
  artifacts_dir: artifacts
  reports_dir: reports
  splits_dir: data/splits

runtime:
  seed: 42
  device: auto
  num_workers: 2
  mixed_precision: true

training:
  batch_size: 32
  epochs: 25
  learning_rate: 0.001
  weight_decay: 0.0001
  optimizer: adamw
  early_stopping_patience: 5

mlp:
  hidden_dims: [512, 256]
  dropout: 0.3
  projection_dim: 512
  weighted_fusion: learnable_softmax
