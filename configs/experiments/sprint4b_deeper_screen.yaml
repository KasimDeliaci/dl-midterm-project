finetuning:
  experiment_name: sprint4b_deeper_resnet50_probe
  seed: 42
  selection_metric: macro_f1
  checkpoint_dir: artifacts/checkpoints/finetuned_deeper_backbones
  feature_source: finetuned_deeper
  backbones:
    - resnet50
  unfreeze_policies:
    resnet50: layer3_layer4
  epochs: 10
  batch_size: 32
  learning_rate: 0.0001
  backbone_learning_rate: 0.00003
  head_learning_rate: 0.0001
  weight_decay: 0.0001
  early_stopping_patience: 3
  class_weighting: true
  loss:
    name: cross_entropy
  augmentation:
    horizontal_flip: true
    vertical_flip: true
    rotation_degrees: 20
    color_jitter: mild

experiment_matrix:
  feature_source: finetuned_deeper
  classifier: mlp
  seed: 42
  screening:
    stop_go_basis: validation_macro_f1
    expand_if_resnet50_val_macro_f1_gain_at_least: 0.020
  fusion_methods:
    - none
  combinations:
    - backbones: [resnet50]
      fusion_methods: [none]
