finetuning:
  seed: 42
  selection_metric: macro_f1
  checkpoint_dir: artifacts/checkpoints/finetuned_backbones
  feature_source: finetuned
  backbones:
    - resnet50
    - mobilenet_v2
    - efficientnet_b0
  unfreeze_policies:
    resnet50: layer4
    mobilenet_v2: last_feature_blocks
    efficientnet_b0: last_feature_blocks
  epochs: 10
  batch_size: 32
  learning_rate: 0.0001
  weight_decay: 0.0001
  early_stopping_patience: 3
  class_weighting: true
  augmentation:
    horizontal_flip: true
    vertical_flip: true
    rotation_degrees: 20
    color_jitter: mild
