finetuning:
  seed: 42
  selection_metric: macro_f1
  checkpoint_dir: artifacts/checkpoints/finetuned_backbones
  backbones:
    - resnet50
    - mobilenet_v2
    - efficientnet_b0
  epochs: 10
  learning_rate: 0.0001
  weight_decay: 0.0001
  early_stopping_patience: 3
  augmentation:
    horizontal_flip: true
    vertical_flip: true
    rotation_degrees: 20
    color_jitter: mild
