finetuning:
  experiment_name: sprint4k_image_balanced_sampler_finetuning
  seed: 42
  selection_metric: macro_f1
  checkpoint_dir: artifacts/checkpoints/finetuned_balanced_sampler_backbones
  feature_source: finetuned_balanced_sampler
  backbones:
    - resnet50
    - mobilenet_v2
    - efficientnet_b0
  unfreeze_policies:
    resnet50: layer3_layer4
    mobilenet_v2: last_feature_blocks
    efficientnet_b0: last_feature_blocks
  epochs: 18
  batch_size: 32
  learning_rate: 0.00008
  backbone_learning_rate: 0.000012
  head_learning_rate: 0.00012
  weight_decay: 0.00015
  early_stopping_patience: 5
  class_weighting: false
  loss:
    name: cross_entropy
  sampler:
    name: class_balanced
    replacement: true
  augmentation:
    horizontal_flip: true
    vertical_flip: true
    rotation_degrees: 20
    color_jitter:
      brightness: 0.05
      contrast: 0.05
      saturation: 0.03
      hue: 0.01
