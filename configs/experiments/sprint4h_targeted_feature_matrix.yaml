experiment_matrix:
  feature_source: finetuned_targeted
  classifier: mlp
  seed: 42
  screening:
    stop_go_basis: validation_macro_f1
    compare_against:
      canonical_sprint4_concat_macro_f1: 0.7059113258715694
      sprint4d_weighted_tta_rot4_macro_f1: 0.7328571895797479
  fusion_methods:
    - none
    - concat
    - weighted
  combinations:
    - backbones: [resnet50]
      fusion_methods: [none]
    - backbones: [mobilenet_v2]
      fusion_methods: [none]
    - backbones: [efficientnet_b0]
      fusion_methods: [none]
    - backbones: [resnet50, mobilenet_v2]
      fusion_methods: [concat, weighted]
    - backbones: [resnet50, efficientnet_b0]
      fusion_methods: [concat, weighted]
    - backbones: [mobilenet_v2, efficientnet_b0]
      fusion_methods: [concat, weighted]
    - backbones: [resnet50, mobilenet_v2, efficientnet_b0]
      fusion_methods: [concat, weighted]
